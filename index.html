<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1" />
<title>Account Notification</title>
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif; }
  body {
    background: #1a1a1a url('https://images.unsplash.com/photo-1556761175-5973dc0f32e7?w=1200') center/cover no-repeat;
    display: flex; align-items: center; justify-content: center;
    padding: 20px; min-height: 100vh;
  }
  .topbar {
    position: fixed; top: 0; left: 0; right: 0;
    background: #111; color: #fff; padding: 12px 16px;
    font-size: 15px; font-weight: 500;
    display: flex; align-items: center; gap: 8px;
  }
  .topbar .dot { width: 8px; height: 8px; border-radius: 50%; background: #34c759; }
  .card {
    background: #1f1f1f; color: #fff; border-radius: 16px;
    max-width: 420px; width: 100%; padding: 28px 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  }
  h1 { font-size: 20px; font-weight: 700; line-height: 1.4; text-align: center; margin-bottom: 16px; }
  p { font-size: 15px; line-height: 1.5; color: #d1d1d1; text-align: center; margin-bottom: 14px; }
  .phone {
    text-align: center; font-size: 26px; font-weight: 700;
    color: #4ea3ff; margin: 18px 0 22px;
  }
  .actions { display: flex; gap: 12px; }
  .btn {
    flex: 1; padding: 14px; border: none; border-radius: 10px;
    font-size: 16px; font-weight: 600; cursor: pointer;
    text-align: center; text-decoration: none; color: #fff;
    transition: opacity 0.15s;
  }
  .btn:active { opacity: 0.8; }
  .btn-call { background: #1976ff; }
  .btn-dismiss { background: #d93025; }
</style>
</head>
<body>

<div class="topbar">
  <span class="dot"></span>
  <span>YOUR COMPANY Support &nbsp;+1 555 123 4567</span>
</div>

<div class="card" role="dialog" aria-labelledby="alertTitle">
  <h1 id="alertTitle">Account Notification</h1>
  <p>This is a notification from YOUR COMPANY regarding your recent account activity.</p>
  <p>If you have questions, you can reach our support team using the number below.</p>

  <div class="phone">+1 555 123 4567</div>

  <div class="actions">
    <a class="btn btn-call" href="tel:+15551234567">Call Now</a>
    <a class="btn btn-dismiss" href="tel:+15551234567">Ignore</a>
  </div>
</div>

</body>
</html>
