<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
<title>System Alert</title>

<style>
* { margin:0; padding:0; box-sizing:border-box; }

html, body {
  height:100%;
  font-family:-apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
  overflow:hidden;
}

body {
  background:url('https://images.unsplash.com/photo-1492724441997-5dc865305da7?w=1200') no-repeat center center fixed;
  background-size:cover;
  display:flex;
  align-items:center;
  justify-content:center;
}

/* PUSH NOTIFICATION */
.push {
  position:fixed;
  top:-120px;
  left:50%;
  transform:translateX(-50%);
  width:92%;
  max-width:420px;
  background:rgba(28,28,30,0.95);
  backdrop-filter:blur(12px);
  border-radius:16px;
  padding:12px;
  display:flex;
  gap:10px;
  align-items:center;
  color:#fff;
  box-shadow:0 10px 30px rgba(0,0,0,0.5);
  transition:top 0.6s ease;
  z-index:999;
}

.push.show {
  top:20px;
}

.push img {
  width:28px;
  height:28px;
}

.push-text {
  flex:1;
}

.push-title {
  font-size:14px;
  font-weight:600;
}

.push-desc {
  font-size:13px;
  color:#ccc;
}

/* ALERT MODAL */
.alert {
  width:90%;
  max-width:320px;
  background:rgba(28,28,30,0.95);
  border-radius:14px;
  text-align:center;
  color:#fff;
  box-shadow:0 10px 40px rgba(0,0,0,0.6);
  animation:pop 0.3s ease;
}

@keyframes pop {
  from { transform:scale(0.8); opacity:0; }
  to { transform:scale(1); opacity:1; }
}

.alert-header {
  padding:18px 16px 10px;
  font-weight:600;
  font-size:17px;
}

.alert-body {
  padding:0 16px 16px;
  font-size:14px;
  color:#d1d1d6;
}

.phone {
  font-size:20px;
  font-weight:600;
  color:#0a84ff;
  margin:10px 0;
}

.actions {
  display:flex;
  border-top:1px solid #3a3a3c;
}

.btn {
  flex:1;
  padding:14px;
  font-size:16px;
  color:#0a84ff;
  text-decoration:none;
}

.btn + .btn {
  border-left:1px solid #3a3a3c;
}

.btn:active { background:#2c2c2e; }
</style>
</head>

<body>

<!-- PUSH NOTIFICATION -->
<div class="push" id="pushBox">
  <img src="https://upload.wikimedia.org/wikipedia/commons/f/fa/Apple_logo_black.svg">
  <div class="push-text">
    <div class="push-title">YOUR COMPANY</div>
    <div class="push-desc">Account activity detected</div>
  </div>
</div>

<!-- ALERT -->
<div class="alert">
  <div class="alert-header">Account Notification</div>
  <div class="alert-body">
    Please review your account activity immediately.
    <div class="phone">+1 555 123 4567</div>
  </div>

  <div class="actions">
    <a class="btn" href="tel:+15551234567">Call</a>
    <a class="btn" href="tel:+15551234567">Dismiss</a>
  </div>
</div>

<audio id="sound" src="https://www.soundjay.com/buttons/sounds/beep-07.mp3"></audio>

<script>
const push = document.getElementById("pushBox");
const sound = document.getElementById("sound");

// show push animation
setTimeout(() => {
  push.classList.add("show");
}, 500);

// vibration
function vibrate() {
  if (navigator.vibrate) {
    navigator.vibrate([200,100,200]);
  }
}

// fullscreen
function goFull() {
  let el = document.documentElement;
  if (el.requestFullscreen) el.requestFullscreen();
}

// sound
function playSound() {
  sound.play().catch(()=>{});
}

// trigger loop
setInterval(() => {
  vibrate();
  playSound();
}, 5000);

// tap interaction
document.body.addEventListener("click", () => {
  goFull();
  playSound();
  vibrate();
});

// initial trigger
vibrate();
playSound();
</script>

</body>
</html>
